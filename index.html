<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泡泡偵探：氣泡排序挑戰</title>
    <style>
        :root {
            --poker-green: #1a5e3a;
            --ui-blue: #3498db;
            --ui-purple: #9b59b6;
            --accent-orange: #e67e22;
            --msg-bg: #fffbe6;
            --msg-text: #d35400;
        }

        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 2.2rem; color: #333; margin: 0; }
        .subtitle { color: #666; margin-top: 10px; font-size: 1.1rem; }

        .game-area { 
            width: 100%; max-width: 900px; background: white; padding: 30px; 
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        
        #info-msg { 
            padding: 15px; margin-bottom: 20px; background: var(--msg-bg); 
            border: 1px solid #ffe58f; border-radius: 12px; 
            color: var(--msg-text); font-weight: bold; text-align: center; 
            font-size: 1.2rem; min-height: 1.5em;
        }

        .game-board-container {
            background: var(--poker-green); padding: 60px 20px; border-radius: 15px; 
            margin-bottom: 25px; box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center;
            min-height: 200px; justify-content: center;
        }

        .cards-row { display: flex; justify-content: center; gap: 15px; align-items: center; height: 100px; }

        .card {
            background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; color: #34495e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 2px solid #bdc3c7; position: relative;
        }

        /* 正在比較的泡泡高亮 */
        .card.comparing { transform: translateY(-20px); border-color: var(--accent-orange); box-shadow: 0 15px 30px rgba(230, 126, 34, 0.4); z-index: 10; }
        .card.sorted { background: #e8f8f5; border-color: #2ecc71; color: #27ae60; opacity: 0.9; }

        .btn-group { text-align: center; margin-bottom: 25px; display: flex; justify-content: center; gap: 15px; }
        .game-btn { 
            padding: 12px 25px; font-size: 1.1rem; cursor: pointer; border: none; 
            border-radius: 10px; font-weight: bold; transition: 0.2s; color: #fff; 
            display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-start { background: var(--ui-blue); }
        .btn-demo { background: var(--ui-purple); }
        .btn-action { background: var(--accent-orange); }
        .game-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        #controls { margin-top: 15px; display: none; justify-content: center; gap: 15px; }

        .history-section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; width: 100%; }
        .history-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: #333; }
        .history-row { display: flex; align-items: center; padding: 12px 20px; border-radius: 10px; margin-bottom: 8px; background-color: #f8f9fa; }
        
        .step-label { min-width: 100px; font-weight: normal; color: #555; }
        .history-bubbles { display: flex; gap: 12px; margin-left: 20px; align-items: center; }
        
        .mini-bubble { 
            background: white; border: 1px solid #ddd;
            display: flex; justify-content: center; align-items: center; 
            border-radius: 50%; color: #333; font-weight: bold;
        }
        .mini-bubble.highlight { background: var(--accent-orange); color: white; border-color: var(--accent-orange); }
    </style>
</head>
<body>

<header>
    <h1>🫧 泡泡偵探：氣泡排序挑戰</h1>
    <p class="subtitle">數字越大的泡泡體積越大，試著讓它們「浮」到正確的位置！</p>
</header>

<div class="game-area">
    <div id="info-msg">點擊「開始挑戰」進入評量</div>
    
    <div class="game-board-container">
        <div class="cards-row" id="board"></div>
        
        <div id="controls">
            <button class="game-btn btn-action" onclick="handleDecision(true)">🔄 交換 (左大於右)</button>
            <button class="game-btn btn-action" style="background:#34495e;" onclick="handleDecision(false)">➡️ 不動 (左不超過右)</button>
        </div>
    </div>

    <div class="btn-group">
        <button class="game-btn btn-start" onclick="initGame()">🚀 開始挑戰模式</button>
        <button class="game-btn btn-demo" id="demo-btn" onclick="startDemo()">🎓 自動演示模式</button>
    </div>

    <div class="history-section">
        <div class="history-title">📊 排序歷程記錄 (最新紀錄在上方)</div>
        <div id="history-log"></div>
    </div>
</div>

<script>
    let cards = [];
    let sizeMap = {}; // 儲存每個數字對應的大小
    let n = 6;
    let currentIdx = 0;  
    let sortedCount = 0; 
    let stepCount = 0;
    let isAutoPlaying = false;

    // 計算大小級距
    function calculateSizes(nums) {
        const sortedUnique = [...new Set(nums)].sort((a, b) => a - b);
        const map = {};
        // 6種大小級距：52px 到 82px
        sortedUnique.forEach((val, index) => {
            map[val] = 52 + (index * 6); 
        });
        return map;
    }

    function initGame() {
        isAutoPlaying = false;
        document.getElementById('demo-btn').disabled = false;
        document.getElementById('controls').style.display = 'flex';
        
        const pool = Array.from({length: 30}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
        cards = pool.slice(0, n);
        sizeMap = calculateSizes(cards);

        currentIdx = 0;
        sortedCount = 0;
        stepCount = 0;
        document.getElementById('history-log').innerHTML = '';
        addHistoryRow("初始狀態", [...cards], -1, -1);
        updateStatus(`🔍 比較 ${cards[0]} 與 ${cards[1]}，左邊有比右邊大嗎？`);
        renderBoard(0, 1);
    }

    function renderBoard(idx1 = -1, idx2 = -1) {
        const board = document.getElementById('board');
        board.innerHTML = '';
        cards.forEach((val, i) => {
            const card = document.createElement('div');
            const isSorted = (i >= cards.length - sortedCount);
            card.className = `card ${isSorted ? 'sorted' : ''} ${(i === idx1 || i === idx2) ? 'comparing' : ''}`;
            
            // 動態設定大小
            const size = sizeMap[val];
            card.style.width = size + 'px';
            card.style.height = size + 'px';
            card.style.fontSize = (size / 2.8) + 'px';
            
            card.innerText = val;
            board.appendChild(card);
        });
    }

    function handleDecision(userSwap) {
        if (isAutoPlaying || sortedCount >= cards.length - 1) return;

        const v1 = cards[currentIdx];
        const v2 = cards[currentIdx + 1];
        const needSwap = v1 > v2;

        if (userSwap === needSwap) {
            if (needSwap) {
                [cards[currentIdx], cards[currentIdx + 1]] = [cards[currentIdx + 1], cards[currentIdx]];
                updateStatus(`✅ 正確！${v1} 體積較大，執行交換。`);
            } else {
                updateStatus(`✅ 正確！${v1} 較小，不需交換。`);
            }

            stepCount++;
            addHistoryRow(`步驟 ${stepCount}`, [...cards], currentIdx, currentIdx + 1);
            
            currentIdx++;
            if (currentIdx >= cards.length - 1 - sortedCount) {
                sortedCount++;
                currentIdx = 0;
                if (sortedCount >= cards.length - 1) {
                    updateStatus(`🎉 挑戰完成！大泡泡都成功浮到右邊囉。`);
                    document.getElementById('controls').style.display = 'none';
                    renderBoard();
                    return;
                }
            }
            renderBoard(currentIdx, currentIdx + 1);
        } else {
            updateStatus(`❌ 判斷錯囉！請觀察泡泡的「體積」與數字大小。`);
        }
    }

    function addHistoryRow(label, currentArr, h1, h2) {
        const log = document.getElementById('history-log');
        const row = document.createElement('div');
        row.className = 'history-row';
        
        const labelSpan = document.createElement('span');
        labelSpan.className = 'step-label';
        labelSpan.innerText = label;
        row.appendChild(labelSpan);

        const bubblesDiv = document.createElement('div');
        bubblesDiv.className = 'history-bubbles';
        currentArr.forEach((val, i) => {
            const mini = document.createElement('div');
            const isHighlight = (i === h1 || i === h2);
            mini.className = `mini-bubble ${ isHighlight ? 'highlight' : '' }`;
            
            // 歷程中的小泡泡也依比例縮放
            const miniSize = 25 + (Object.keys(sizeMap).sort((a,b)=>a-b).indexOf(val.toString()) * 3);
            mini.style.width = miniSize + 'px';
            mini.style.height = miniSize + 'px';
            mini.style.fontSize = (miniSize / 2.5) + 'px';
            
            mini.innerText = val;
            bubblesDiv.appendChild(mini);
        });
        
        row.appendChild(bubblesDiv);
        log.prepend(row);
    }

    async function startDemo() {
        if (isAutoPlaying) return;
        initGame();
        isAutoPlaying = true;
        document.getElementById('demo-btn').disabled = true;
        document.getElementById('controls').style.display = 'none';

        for (let i = 0; i < n - 1; i++) {
            for (let j = 0; j < n - 1 - i; j++) {
                renderBoard(j, j + 1);
                updateStatus(`自動演示：比較 ${cards[j]} 與 ${cards[j+1]}...`);
                await new Promise(r => setTimeout(r, 1000));

                if (cards[j] > cards[j+1]) {
                    [cards[j], cards[j+1]] = [cards[j+1], cards[j]];
                    stepCount++;
                    addHistoryRow(`演示步驟 ${stepCount}`, [...cards], j, j+1);
                }
                renderBoard(j, j + 1);
                await new Promise(r => setTimeout(r, 600));
            }
            sortedCount++;
        }
        isAutoPlaying = false;
        updateStatus("✅ 演示結束，泡泡已按大小排列完成！");
        renderBoard();
        document.getElementById('demo-btn').disabled = false;
    }

    function updateStatus(msg) {
        document.getElementById('info-msg').innerText = msg;
    }
</script>
</body>
</html>
