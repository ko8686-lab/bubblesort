<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泡泡偵探：氣泡排序 (歷程修正版)</title>
    <style>
        :root {
            --poker-green: #1a5e3a;
            --bubble-bg: #dff9fb;
            --accent-gold: #f1c40f;
            --ui-blue: #3498db;
            --sorted-bg: #6ab04c;
        }

        body { font-family: "Microsoft JhengHei", sans-serif; background: #2c3e50; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .game-area { width: 100%; max-width: 850px; background: white; padding: 25px; border-radius: 15px; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        #info-msg { 
            padding: 15px; margin-bottom: 20px; background: #f8f9fa; border: 2px solid #dee2e6;
            border-radius: 8px; color: #2c3e50; font-weight: bold; text-align: center; font-size: 1.2rem;
        }

        .game-board-container {
            background: var(--poker-green); padding: 50px 20px; border-radius: 12px; 
            margin-bottom: 20px; box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; min-height: 150px;
        }

        .cards-row { display: flex; justify-content: center; gap: 20px; }
        .card {
            width: 70px; height: 70px; background: var(--bubble-bg); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 26px; font-weight: bold; color: #0984e3;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: all 0.3s ease; border: 3px solid #74b9ff;
        }

        .card.comparing { transform: translateY(-15px); border-color: var(--accent-gold); box-shadow: 0 15px 25px rgba(241, 196, 15, 0.4); }
        .card.sorted { background: #badc58; border-color: var(--sorted-bg); color: #2f3542; }

        .control-group { text-align: center; margin: 20px 0; display: none; }
        .game-btn { padding: 12px 30px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 8px; margin: 0 10px; font-weight: bold; transition: 0.2s; color: #fff; }
        .btn-swap { background: var(--accent-gold); color: #333; }
        .btn-keep { background: var(--ui-blue); }
        .btn-start { background: #27ae60; width: 200px; display: block; margin: 0 auto; }

        .history-section { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .history-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; padding: 10px; background: #fafafa; border-radius: 6px; }
        .history-row.pass-end { background: #e8f8f5; border-left: 5px solid var(--sorted-bg); }
        .step-label { min-width: 110px; font-weight: bold; color: #666; font-size: 0.9rem; }
        .mini-card { width: 30px; height: 30px; background: white; border: 1px solid #ccc; display: flex; justify-content: center; align-items: center; font-size: 12px; border-radius: 50%; }
        .mini-card.swap { background: var(--accent-gold); color: #333; border-color: var(--accent-gold); }
    </style>
</head>
<body>

<h1>🫧 泡泡偵探：氣泡排序 (優化版)</h1>

<div class="game-area">
    <div id="info-msg">點擊「開始挑戰」來進行練習</div>
    
    <div class="game-board-container">
        <div class="cards-row" id="board"></div>
    </div>

    <div class="control-group" id="controls">
        <button class="game-btn btn-swap" onclick="handleDecision(true)">🔄 左大於右 (交換)</button>
        <button class="game-btn btn-keep" onclick="handleDecision(false)">➡️ 左不超過右 (不動)</button>
    </div>

    <button id="start-btn" class="game-btn btn-start" onclick="initGame()">🚀 開始挑戰模式</button>

    <div class="history-section">
        <h3>📊 排序歷程記錄 (僅記錄變動步驟)</h3>
        <div id="history-log"></div>
    </div>
</div>

<script>
    let cards = [];
    let n = 6;
    let currentIdx = 0;  
    let sortedCount = 0; 
    let stepCount = 0;
    let currentPass = 1;

    function initGame() {
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('controls').style.display = 'block';
        const pool = Array.from({length: 30}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
        cards = pool.slice(0, n);
        currentIdx = 0;
        sortedCount = 0;
        stepCount = 0;
        currentPass = 1;
        document.getElementById('history-log').innerHTML = '';
        addHistoryRow("初始狀態", [...cards], -1, -1);
        updateStatus(`🔍 回合 ${currentPass}：比較 ${cards[0]} 與 ${cards[1]}`, "info");
        renderBoard(0, 1);
    }

    function renderBoard(idx1 = -1, idx2 = -1) {
        const board = document.getElementById('board');
        board.innerHTML = '';
        cards.forEach((val, i) => {
            const card = document.createElement('div');
            const isSorted = (i >= cards.length - sortedCount);
            card.className = `card ${isSorted ? 'sorted' : ''} ${(i === idx1 || i === idx2) ? 'comparing' : ''}`;
            card.innerText = val;
            board.appendChild(card);
        });
    }

    function handleDecision(userSwap) {
        if (sortedCount >= cards.length - 1) return;
        const v1 = cards[currentIdx];
        const v2 = cards[currentIdx + 1];
        const needSwap = v1 > v2;

        if (userSwap === needSwap) {
            if (needSwap) {
                [cards[currentIdx], cards[currentIdx + 1]] = [cards[currentIdx + 1], cards[currentIdx]];
                stepCount++;
                addHistoryRow(`步驟 ${stepCount} (交換)`, [...cards], currentIdx, currentIdx + 1);
                updateStatus(`✅ 正確！${v1} > ${v2}，泡泡交換了。`, "success");
            } else {
                updateStatus(`✅ 正確！${v1} < ${v2}，不需交換，繼續觀察下一個。`, "success");
            }

            currentIdx++;

            if (currentIdx >= cards.length - 1 - sortedCount) {
                const fixedValue = cards[cards.length - 1 - sortedCount];
                sortedCount++;
                addHistoryRow(`回合 ${currentPass} 結束`, [...cards], -1, -1, true);
                currentPass++;
                currentIdx = 0;
                
                if (sortedCount >= cards.length - 1) {
                    updateStatus(`🎉 挑戰成功！所有泡泡都排好囉！`, "success");
                    document.getElementById('controls').style.display = 'none';
                    document.getElementById('start-btn').style.display = 'block';
                    renderBoard();
                    return;
                } else {
                    updateStatus(`✨ 泡泡 ${fixedValue} 已就位！下一回合開始。`, "info");
                }
            }
            renderBoard(currentIdx, currentIdx + 1);
        } else {
            updateStatus(`❌ 判斷錯囉！請看清楚 ${v1} 與 ${v2} 的大小關係。`, "warn");
        }
    }

    function updateStatus(msg, type) {
        const el = document.getElementById('info-msg');
        el.innerText = msg;
        el.style.background = (type === "success") ? "#eef9f1" : (type === "warn" ? "#fff2f0" : "#f8f9fa");
    }

    function addHistoryRow(label, currentArr, i1, i2, isPassEnd = false) {
        const log = document.getElementById('history-log');
        const row = document.createElement('div');
        row.className = `history-row ${isPassEnd ? 'pass-end' : ''}`;
        row.innerHTML = `<span class="step-label">${label}</span>`;
        currentArr.forEach((val, i) => {
            const isSwap = (i === i1 || i === i2);
            row.innerHTML += `<div class="mini-card ${isSwap ? 'swap' : ''}">${val}</div>`;
        });
        log.prepend(row); // 讓最新的記錄出現在最上面，方便學生查看
    }
</script>
</body>
</html>
