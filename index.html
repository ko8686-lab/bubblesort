<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泡泡偵探：氣泡排序 (對齊修正版)</title>
    <style>
        :root {
            --poker-green: #1a5e3a;
            --bubble-bg: #dff9fb;
            --accent-gold: #f1c40f;
            --ui-blue: #3498db;
            --ui-purple: #9b59b6; 
            --sorted-bg: #6ab04c;
        }

        body { font-family: "Microsoft JhengHei", sans-serif; background: #2c3e50; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .game-area { width: 100%; max-width: 850px; background: white; padding: 25px; border-radius: 15px; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        #info-msg { 
            padding: 15px; margin-bottom: 20px; background: #f8f9fa; border: 2px solid #dee2e6;
            border-radius: 8px; color: #2c3e50; font-weight: bold; text-align: center; font-size: 1.2rem;
            min-height: 1.5em;
        }

        .game-board-container {
            background: var(--poker-green); padding: 50px 20px; border-radius: 12px; 
            margin-bottom: 20px; box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; min-height: 200px;
            justify-content: center;
        }

        .cards-row { display: flex; justify-content: center; gap: 20px; align-items: center; height: 100px; }
        
        .card {
            background: var(--bubble-bg); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; color: #0984e3;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: all 0.3s ease; border: 3px solid #74b9ff;
        }

        .card.comparing { transform: translateY(-15px); border-color: var(--accent-gold); box-shadow: 0 15px 25px rgba(241, 196, 15, 0.4); }
        .card.sorted { background: #badc58; border-color: var(--sorted-bg); color: #2f3542; }

        .btn-group { text-align: center; margin: 10px 0 20px 0; }
        .control-group { text-align: center; margin: 20px 0; display: none; }
        
        .game-btn { padding: 12px 25px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 8px; margin: 0 10px; font-weight: bold; transition: 0.2s; color: #fff; }
        .btn-swap { background: var(--accent-gold); color: #333; }
        .btn-keep { background: var(--ui-blue); }
        .btn-start { background: #27ae60; }
        .btn-demo { background: var(--ui-purple); }

        /* --- 歷史記錄對齊關鍵 CSS --- */
        .history-section { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; width: 100%; }
        
        .history-row { 
            display: grid; 
            /* 固定標籤寬度 150px，後面 6 個球格各 65px */
            grid-template-columns: 150px repeat(6, 65px); 
            align-items: center; 
            margin-bottom: 8px; 
            padding: 10px 15px; 
            background: #fafafa; 
            border-radius: 6px;
            box-sizing: border-box;
        }

        .history-row.pass-end { 
            background: #e8f8f5; 
            border-left: 5px solid var(--sorted-bg); 
            padding-left: 10px; /* 扣除 border 寬度保持總寬度一致 */
        }

        .step-label { font-weight: bold; color: #666; font-size: 0.95rem; }
        
        .mini-card-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 65px; /* 與 grid 欄寬一致 */
        }
        
        .mini-card { 
            background: white; 
            border: 1px solid #ccc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-radius: 50%; 
            transition: all 0.3s;
        }
        
        .mini-card.swap { background: var(--accent-gold); color: #333; border-color: var(--accent-gold); font-weight: bold; }
        .mini-card.fixed { background: var(--sorted-bg); color: white; border-color: var(--sorted-bg); font-weight: bold; }
    </style>
</head>
<body>

<h1>🫧 泡泡偵探：氣泡排序 (自動對齊版)</h1>

<div class="game-area">
    <div id="info-msg">選擇模式開始練習</div>
    
    <div class="game-board-container">
        <div class="cards-row" id="board"></div>
    </div>

    <div class="btn-group" id="mode-selection">
        <button id="start-btn" class="game-btn btn-start" onclick="initGame('manual')">🚀 開始挑戰模式</button>
        <button id="demo-btn" class="game-btn btn-demo" onclick="initGame('auto')">🎓 自動演示模式</button>
    </div>

    <div class="control-group" id="controls">
        <button class="game-btn btn-swap" onclick="handleDecision(true)">🔄 左大於右 (交換)</button>
        <button class="game-btn btn-keep" onclick="handleDecision(false)">➡️ 左不超過右 (不動)</button>
    </div>

    <div class="history-section">
        <h3>📊 排序歷程記錄 (由上往下對齊)</h3>
        <div id="history-log"></div>
    </div>
</div>

<script>
    let cards = [];
    let n = 6;
    let currentIdx = 0;  
    let sortedCount = 0; 
    let stepCount = 0;
    let currentPass = 1;
    let isAutoPlaying = false;
    let sizeMap = {}; 

    function calculateSizes() {
        const sortedUnique = [...new Set(cards)].sort((a, b) => a - b);
        sizeMap = {};
        sortedUnique.forEach((val, index) => {
            sizeMap[val] = 50 + (index * 8); 
        });
    }

    function initGame(mode) {
        if (isAutoPlaying) return;
        document.getElementById('mode-selection').style.display = 'none';
        const pool = Array.from({length: 30}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
        cards = pool.slice(0, n);
        calculateSizes();
        currentIdx = 0;
        sortedCount = 0;
        stepCount = 0;
        currentPass = 1;
        document.getElementById('history-log').innerHTML = '';
        addHistoryRow("初始狀態", [...cards], -1, -1);
        if (mode === 'manual') {
            document.getElementById('controls').style.display = 'block';
            updateStatus(`🔍 回合 ${currentPass}：比較 ${cards[0]} 與 ${cards[1]}`, "info");
            renderBoard(0, 1);
        } else {
            document.getElementById('controls').style.display = 'none';
            startAutoDemo();
        }
    }

    function renderBoard(idx1 = -1, idx2 = -1) {
        const board = document.getElementById('board');
        board.innerHTML = '';
        cards.forEach((val, i) => {
            const card = document.createElement('div');
            const isSorted = (i >= cards.length - sortedCount);
            card.className = `card ${isSorted ? 'sorted' : ''} ${(i === idx1 || i === idx2) ? 'comparing' : ''}`;
            const size = sizeMap[val];
            card.style.width = size + 'px';
            card.style.height = size + 'px';
            card.style.fontSize = (size * 0.4) + 'px';
            card.innerText = val;
            board.appendChild(card);
        });
    }

    async function startAutoDemo() {
        isAutoPlaying = true;
        updateStatus("🎓 自動演示中：觀察大數字如何不斷浮向最右側...", "info");
        for (let i = 0; i < n - 1; i++) {
            for (let j = 0; j < n - 1 - i; j++) {
                currentIdx = j;
                renderBoard(j, j + 1);
                await new Promise(r => setTimeout(r, 800));
                if (cards[j] > cards[j + 1]) {
                    [cards[j], cards[j + 1]] = [cards[j + 1], cards[j]];
                    stepCount++;
                    addHistoryRow(`演示步驟 ${stepCount}`, [...cards], j, j + 1);
                } else {
                    // 若不交換，雖然數列沒變，但也要記錄一下當前比較的對象
                    // addHistoryRow(`演示步驟 ${stepCount} (不動)`, [...cards], j, j + 1);
                }
                renderBoard(j, j + 1);
                await new Promise(r => setTimeout(r, 600));
            }
            sortedCount++;
            addHistoryRow(`回合 ${currentPass} 結束`, [...cards], -1, -1, true);
            currentPass++;
            renderBoard();
            await new Promise(r => setTimeout(r, 1000));
        }
        updateStatus(`🎉 演示完成！`, "success");
        isAutoPlaying = false;
        document.getElementById('mode-selection').style.display = 'block';
    }

    function handleDecision(userSwap) {
        if (isAutoPlaying || sortedCount >= cards.length - 1) return;
        const v1 = cards[currentIdx], v2 = cards[currentIdx + 1];
        const needSwap = v1 > v2;
        if (userSwap === needSwap) {
            if (needSwap) {
                [cards[currentIdx], cards[currentIdx + 1]] = [cards[currentIdx + 1], cards[currentIdx]];
                stepCount++;
                addHistoryRow(`步驟 ${stepCount} (交換)`, [...cards], currentIdx, currentIdx + 1);
            }
            currentIdx++;
            if (currentIdx >= cards.length - 1 - sortedCount) {
                sortedCount++;
                addHistoryRow(`回合 ${currentPass} 結束`, [...cards], -1, -1, true);
                currentPass++;
                currentIdx = 0;
                if (sortedCount >= cards.length - 1) {
                    updateStatus(`🎉 挑戰成功！`, "success");
                    document.getElementById('controls').style.display = 'none';
                    document.getElementById('mode-selection').style.display = 'block';
                    renderBoard(); return;
                }
            }
            renderBoard(currentIdx, currentIdx + 1);
        } else { updateStatus(`❌ 判斷錯囉！`, "warn"); }
    }

    function updateStatus(msg, type) {
        const el = document.getElementById('info-msg');
        el.innerText = msg;
        el.style.background = (type === "success") ? "#eef9f1" : (type === "warn" ? "#fff2f0" : "#f8f9fa");
    }

    // 歷史記錄呈現邏輯修正
    function addHistoryRow(label, currentArr, i1, i2, isPassEnd = false) {
        const log = document.getElementById('history-log');
        const row = document.createElement('div');
        row.className = `history-row ${isPassEnd ? 'pass-end' : ''}`;
        
        const labelSpan = document.createElement('span');
        labelSpan.className = 'step-label';
        labelSpan.innerText = label;
        row.appendChild(labelSpan);

        currentArr.forEach((val, i) => {
            const container = document.createElement('div');
            container.className = 'mini-card-container';
            
            const isComparing = (i === i1 || i === i2);
            // 判斷是否為「回合結束」中「已排序好」的部分
            const isFixed = isPassEnd && (i >= currentArr.length - sortedCount);
            
            const mini = document.createElement('div');
            mini.className = `mini-card ${isComparing ? 'swap' : ''} ${isFixed ? 'fixed' : ''}`;
            
            const baseSize = 28;
            const sortedVals = [...new Set(currentArr)].sort((a,b)=>a-b);
            const rank = sortedVals.indexOf(val);
            const miniSize = baseSize + (rank * 3.5); 
            
            mini.style.width = miniSize + 'px';
            mini.style.height = miniSize + 'px';
            mini.style.fontSize = (miniSize * 0.45) + 'px';
            mini.innerText = val;
            
            container.appendChild(mini);
            row.appendChild(container);
        });
        log.prepend(row); 
    }
</script>
</body>
</html>
